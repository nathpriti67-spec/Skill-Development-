<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Glass Bangles</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        background: linear-gradient(to right, #ffdde1, #ee9ca7);
        color: white;
    }

    header{
        height:100vh;
        background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
        url('https://images.unsplash.com/photo-1617038220319-276d3cfab638?auto=format&fit=crop&w=1200&q=80');
        background-size: cover;
        background-position: center;
        display:flex;
        justify-content:center;
        align-items:center;
        text-align:center;
        padding:20px;
    }

    .hero{
        background: rgba(255,255,255,0.15);
        padding:40px;
        border-radius:20px;
        backdrop-filter: blur(10px);
        box-shadow:0 8px 20px rgba(0,0,0,0.4);
    }

    .hero h1{
        font-size:60px;
        color:#ffd700;
        margin-bottom:15px;
        text-shadow:2px 2px 5px black;
    }

    .hero p{
        font-size:22px;
        margin-bottom:25px;
    }

    .btn{
        display:inline-block;
        padding:15px 35px;
        background:#ff1493;
        color:white;
        text-decoration:none;
        border-radius:30px;
        font-size:18px;
        transition:0.4s;
    }

    .btn:hover{
        background:#ffd700;
        color:black;
        transform:scale(1.1);
    }

    .gallery{
        padding:60px 10%;
        text-align:center;
    }

    .gallery h2{
        font-size:40px;
        margin-bottom:40px;
        color:#fff;
    }

    .images{
        display:grid;
        grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
        gap:25px;
    }

    .card{
        background:rgba(255,255,255,0.15);
        border-radius:20px;
        overflow:hidden;
        backdrop-filter: blur(10px);
        transition:0.4s;
        box-shadow:0 6px 15px rgba(0,0,0,0.3);
    }

    .card:hover{
        transform:translateY(-10px);
    }

    .card img{
        width:100%;
        height:300px;
        object-fit:cover;
    }

    .card h3{
        padding:15px;
        color:#ffd700;
    }

    footer{
        text-align:center;
        padding:20px;
        background:#111;
        font-size:18px;
    }
</style>

</head>
<body>

<header>
    <div class="hero">
        <h1>Royal Glass Bangles</h1>
        <p>Shine with Traditional Elegance & Colorful Beauty</p>
        <a href="#" class="btn">Shop Now</a>
    </div>
</header>

<section class="gallery">
    <h2>Our Stylish Collections</h2>

    <div class="images">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1617038220319-276d3cfab638?auto=format&fit=crop&w=600&q=80" alt="Glass Bangles">
            <h3>Traditional Glass Bangles</h3>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=600&q=80" alt="Stylish Bangles">
            <h3>Modern Designer Bangles</h3>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1611652022419-a9419f74343d?auto=format&fit=crop&w=600&q=80" alt="Colorful Bangles">
            <h3>Colorful Bridal Collection</h3>
        </div>

    </div>
</section>

<footer>
    © 2026 Royal Glass Bangles | Fashion That Sparkles
</footer>

</body>
</html>
