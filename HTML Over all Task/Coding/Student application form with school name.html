<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>School Student Application Form</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#f2f2f2;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
    }

    .container{
      width:500px;
      background:#fff;
      padding:30px;
      border-radius:10px;
      box-shadow:0 4px 10px rgba(0,0,0,0.2);
    }

    h1{
      text-align:center;
      margin-bottom:20px;
      color:#333;
    }

    .form-group{
      margin-bottom:15px;
    }

    label{
      display:block;
      margin-bottom:5px;
      font-weight:bold;
      color:#444;
    }

    input,
    select,
    textarea{
      width:100%;
      padding:10px;
      border:1px solid #ccc;
      border-radius:5px;
      font-size:14px;
    }

    textarea{
      resize:none;
    }

    .gender{
      display:flex;
      gap:15px;
      margin-top:5px;
    }

    .gender label{
      font-weight:normal;
    }

    button{
      width:100%;
      padding:12px;
      background:#007BFF;
      color:white;
      border:none;
      border-radius:5px;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#0056b3;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>David High School Student Application</h1>

    <form>
      
      <div class="form-group">
        <label>Student Name</label>
        <input type="text" placeholder="Enter full name" required>
      </div>

      <div class="form-group">
        <label>Date of Birth</label>
        <input type="date" required>
      </div>

      <div class="form-group">
        <label>Gender</label>
        <div class="gender">
          <label><input type="radio" name="gender"> Male</label>
          <label><input type="radio" name="gender"> Female</label>
          <label><input type="radio" name="gender"> Other</label>
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="Enter email">
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" placeholder="Enter phone number">
      </div>

      <div class="form-group">
        <label>Class Applying For</label>
        <select>
          <option>Select Class</option>
          <option>1st Standard</option>
          <option>2nd Standard</option>
          <option>3rd Standard</option>
          <option>4th Standard</option>
          <option>5th Standard</option>
        </select>
      </div>

      <div class="form-group">
        <label>Address</label>
        <textarea rows="4" placeholder="Enter address"></textarea>
      </div>

      <div class="form-group">
        <label>Parent/Guardian Name</label>
        <input type="text" placeholder="Enter parent name">
      </div>

      <div class="form-group">
        <label>Previous School Name</label>
        <input type="text" placeholder="Enter previous school">
      </div>

      <button type="submit">Submit Application</button>

    </form>
  </div>

</body>
</html>
